name: Build AudioTTo

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # -------------------------
      # FFmpeg setup
      # -------------------------
      - name: Setup FFmpeg (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y ffmpeg
          mkdir -p bin
          cp /usr/bin/ffmpeg bin/ffmpeg
          cp /usr/bin/ffprobe bin/ffprobe

      - name: Setup FFmpeg (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir bin
          choco install ffmpeg -y
          copy "C:\Program Files\ffmpeg\bin\ffmpeg.exe" bin\
          copy "C:\Program Files\ffmpeg\bin\ffprobe.exe" bin\

      - name: Setup FFmpeg (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install ffmpeg
          mkdir -p bin
          cp "$(brew --prefix)/bin/ffmpeg" bin/ffmpeg
          cp "$(brew --prefix)/bin/ffprobe" bin/ffprobe
          chmod +x bin/ffmpeg bin/ffprobe

      # -------------------------
      # Build
      # -------------------------
      - name: Build with PyInstaller
        run: pyinstaller build.spec --clean --noconfirm

      # -------------------------
      # Debug macOS bundle
      # -------------------------
      - name: Verify macOS App
        if: runner.os == 'macOS'
        run: |
          ls -R dist/AudioTTo.app/Contents

      # -------------------------
      # Upload artifact
      # -------------------------
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AudioTTo-${{ runner.os }}
          path: dist/
