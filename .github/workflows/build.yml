name: Build AudioTTo Multi-Platform

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: AudioTTo_Linux

          - os: macos-latest
            artifact_name: AudioTTo_MacOS

          - os: windows-latest
            artifact_name: AudioTTo_Windows

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # ---------- LINUX DEPENDENCIES (GTK + WEBKIT) ----------
    - name: Install Linux System Dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libgtk-3-dev \
          libwebkit2gtk-4.1-dev \
          libgirepository1.0-dev \
          libcairo2-dev \
          pkg-config \
          python3-gi \
          python3-gi-cairo \
          gir1.2-gtk-3.0 \
          gir1.2-webkit2-4.1

    # ---------- PYTHON ----------
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install Python Dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Create bin directory
      run: mkdir -p bin

    # ---------- FFMPEG LINUX ----------
    - name: Download FFmpeg (Linux)
      if: runner.os == 'Linux'
      run: |
        wget https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz
        tar -xf ffmpeg-release-amd64-static.tar.xz
        mv ffmpeg-*-amd64-static/ffmpeg bin/
        mv ffmpeg-*-amd64-static/ffprobe bin/
        chmod +x bin/ffmpeg bin/ffprobe

    # ---------- FFMPEG MACOS ----------
    - name: Download FFmpeg (macOS)
      if: runner.os == 'macOS'
      run: |
        curl -L -o ffmpeg.zip https://evermeet.cx/pub/ffmpeg/ffmpeg-7.1.zip
        curl -L -o ffprobe.zip https://evermeet.cx/pub/ffprobe/ffprobe-7.1.zip

        unzip -o ffmpeg.zip
        unzip -o ffprobe.zip

        mv ffmpeg bin/
        mv ffprobe bin/
        chmod +x bin/ffmpeg bin/ffprobe
        ls -l bin/

    # ---------- FFMPEG WINDOWS (ROBUST FIX) ----------
    - name: Download FFmpeg (Windows)
      if: runner.os == 'Windows'
      shell: powershell
      run: |
        Invoke-WebRequest `
          -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" `
          -OutFile "ffmpeg.zip"

        Expand-Archive -Path "ffmpeg.zip" -DestinationPath "ffmpeg"

        $ffmpegExe = Get-ChildItem -Recurse -Filter ffmpeg.exe | Select-Object -First 1
        $ffprobeExe = Get-ChildItem -Recurse -Filter ffprobe.exe | Select-Object -First 1

        if (-not $ffmpegExe -or -not $ffprobeExe) {
          Write-Error "FFmpeg binaries not found"
          exit 1
        }

        Move-Item $ffmpegExe.FullName bin\ffmpeg.exe
        Move-Item $ffprobeExe.FullName bin\ffprobe.exe
        Get-ChildItem bin

    # ---------- BUILD ----------
    - name: Build with PyInstaller
      run: pyinstaller build.spec

    # ---------- VERIFY BUILD ----------
    - name: List dist contents (debug)
      shell: bash
      run: |
        echo "=== Contents of dist/ folder ==="
        ls -lah dist/
        echo "================================"

    # ---------- PACKAGE & UPLOAD ----------
    - name: Package Windows Build
      if: runner.os == 'Windows'
      shell: powershell
      run: |
        # Windows crea un singolo .exe
        if (Test-Path "dist\AudioTTo.exe") {
          Compress-Archive -Path "dist\AudioTTo.exe" -DestinationPath "AudioTTo_Windows.zip"
          Write-Host "✓ Windows build packaged successfully"
        } else {
          Write-Error "AudioTTo.exe not found in dist/"
          exit 1
        }

    - name: Package macOS Build
      if: runner.os == 'macOS'
      run: |
        # macOS crea un .app bundle
        if [ -d "dist/AudioTTo.app" ]; then
          cd dist
          zip -r ../AudioTTo_MacOS.zip AudioTTo.app
          cd ..
          echo "✓ macOS build packaged successfully"
        else
          echo "ERROR: AudioTTo.app not found in dist/"
          exit 1
        fi

    - name: Package Linux Build
      if: runner.os == 'Linux'
      run: |
        # Linux crea un singolo eseguibile
        if [ -f "dist/AudioTTo" ]; then
          cd dist
          tar -czf ../AudioTTo_Linux.tar.gz AudioTTo
          cd ..
          echo "✓ Linux build packaged successfully"
        else
          echo "ERROR: AudioTTo executable not found in dist/"
          exit 1
        fi

    - name: Upload Windows Artifact
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: AudioTTo_Windows
        path: AudioTTo_Windows.zip

    - name: Upload macOS Artifact
      if: runner.os == 'macOS'
      uses: actions/upload-artifact@v4
      with:
        name: AudioTTo_MacOS
        path: AudioTTo_MacOS.zip

    - name: Upload Linux Artifact
      if: runner.os == 'Linux'
      uses: actions/upload-artifact@v4
      with:
        name: AudioTTo_Linux
        path: AudioTTo_Linux.tar.gz
